<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="disc">
      <circle cx="256" cy="256" r="252"/>
    </clipPath>
    <radialGradient id="sunGlow" cx="50%" cy="36%" r="38%">
      <stop offset="0%"   stop-color="#fff8e0" stop-opacity="1"/>
      <stop offset="28%"  stop-color="#f5c040" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#f5a623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Scene behind the A -->
  <g clip-path="url(#disc)">

    <!-- Deep night sky -->
    <rect width="512" height="512" fill="#090914"/>

    <!-- Faint horizon warmth -->
    <ellipse cx="256" cy="330" rx="270" ry="130" fill="#c06010" opacity="0.07"/>
    <ellipse cx="256" cy="300" rx="200" ry="85"  fill="#f5a623" opacity="0.05"/>

    <!-- Stars -->
    <circle cx="122" cy="72"  r="1.3" fill="white" opacity="0.75"/>
    <circle cx="170" cy="48"  r="1.0" fill="white" opacity="0.60"/>
    <circle cx="215" cy="82"  r="0.9" fill="white" opacity="0.50"/>
    <circle cx="305" cy="58"  r="1.2" fill="white" opacity="0.70"/>
    <circle cx="352" cy="85"  r="1.0" fill="white" opacity="0.55"/>
    <circle cx="400" cy="50"  r="1.3" fill="white" opacity="0.80"/>
    <circle cx="445" cy="78"  r="0.9" fill="white" opacity="0.45"/>
    <circle cx="88"  cy="148" r="0.9" fill="white" opacity="0.40"/>
    <circle cx="448" cy="140" r="1.0" fill="white" opacity="0.50"/>
    <circle cx="60"  cy="220" r="0.8" fill="white" opacity="0.35"/>
    <circle cx="462" cy="215" r="0.8" fill="white" opacity="0.35"/>

    <!-- Sun glow -->
    <circle cx="256" cy="185" r="185" fill="url(#sunGlow)"/>

    <!-- Sun disk -->
    <circle cx="256" cy="185" r="20"  fill="#fffdf0"/>
    <circle cx="256" cy="185" r="13"  fill="white"/>

    <!-- Mountain range — far (lighter, jagged) -->
    <path d="M -10 390
             L  55 305  L 100 335  L 155 268
             L 200 308  L 256 252  L 312 308
             L 358 270  L 412 337  L 460 302
             L 522 360  L 522 512  L -10 512 Z"
          fill="#12203c"/>

    <!-- Mountain range — near (darker, softer) -->
    <path d="M -10 425
             L  38 388  L  95 400  L 155 368
             L 210 386  L 256 350  L 302 386
             L 358 370  L 415 402  L 472 388
             L 522 408  L 522 512  L -10 512 Z"
          fill="#0c1728"/>

    <!-- Ocean deep -->
    <rect x="-10" y="428" width="535" height="100" fill="#082e28"/>

    <!-- Ocean layers -->
    <path d="M -10 432 C  75 412 158 444 242 426 C 326 408 412 438 522 420 L 522 512 L -10 512 Z"
          fill="#0f4840"/>
    <path d="M -10 450 C  88 430 180 460 270 444 C 352 428 436 456 522 440 L 522 512 L -10 512 Z"
          fill="#1a7065"/>
    <path d="M -10 466 C 105 448 205 473 308 458 C 396 444 460 466 522 454 L 522 512 L -10 512 Z"
          fill="#2a9d8f"/>

    <!-- Wave crests -->
    <path d="M  10 464 C  95 446 198 472 305 456 C 395 442 458 464 510 452"
          stroke="#4ecdc4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M  18 480 C  98 464 198 484 300 470 C 388 458 454 477 510 466"
          stroke="#4ecdc4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>

  </g>

  <!-- THE A — bold gold letterform, even-odd fill exposes the scene through the triangle hole -->
  <g clip-path="url(#disc)">
    <path
      fill="#f5a623"
      fill-rule="evenodd"
      d="
        M 256  60
        L  78 422
        L 158 422
        L 186 302
        L 326 302
        L 354 422
        L 434 422
        Z
        M 256 116
        L 320 270
        L 192 270
        Z
      "
    />
  </g>

  <!-- Border rings -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#f5a623" stroke-width="3"   opacity="0.50"/>
  <circle cx="256" cy="256" r="241" fill="none" stroke="#f5a623" stroke-width="0.8" opacity="0.20"/>

</svg>
